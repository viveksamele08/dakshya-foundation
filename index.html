<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dakshya Foundation is an NGO founded in 2026 by Malaviyans, dedicated to supporting students from regional colleges and cities to excel in software engineering, communication, and career growth through 1:1 industry mentorship." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Dakshya Foundation | Empowering Next-Gen Software Careers</title>
    <style>
      /* Critical minimal styles to avoid a black flash while app bundles load */
      html, body { height: 100%; }
      body { margin: 0; background: #070a13; color: #f8fafc; font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; }
      #initial-loader { display:flex; align-items:center; justify-content:center; height:100vh; width:100vw; }
      .loader-dot { width:10px; height:10px; margin:6px; border-radius:50%; background:#14b8a6; animation: pulse 1s infinite ease-in-out; }
      .loader-dot:nth-child(2) { animation-delay: 0.15s }
      .loader-dot:nth-child(3) { animation-delay: 0.3s }
      @keyframes pulse { 0% { opacity: 0.25; transform: scale(0.9) } 50% { opacity: 1; transform: scale(1.15) } 100% { opacity: 0.25; transform: scale(0.9) } }
    </style>
  </head>
  <body>
    <!-- Hidden forms for Netlify detection -->
    <div style="display:none;">
      <form name="student-application" netlify>
        <input name="name" />
        <input name="email" />
        <input name="college" />
        <input name="city" />
        <input name="techInterest" />
        <input name="resumeLink" />
      </form>

      <form name="volunteer-application" netlify>
        <input name="name" />
        <input name="email" />
        <input name="role" />
        <input name="expertise" />
        <input name="linkedin" />
      </form>

      <form name="donation" netlify>
        <input name="amount" />
      </form>
    </div>
    <div id="initial-loader" aria-hidden="true">
      <div style="display:flex;align-items:center;justify-content:center;">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
