<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Netlify Forms (static)</title>
  </head>
  <body>
    <!-- Hidden static forms so Netlify detects them at build time -->
    <div style="display:none;">
      <form name="student-application" netlify>
        <input type="hidden" name="form-name" value="student-application" />
        <input name="name" />
        <input name="email" />
        <input name="college" />
        <input name="city" />
        <input name="techInterest" />
        <input name="resumeLink" />
      </form>

      <form name="volunteer-application" netlify>
        <input type="hidden" name="form-name" value="volunteer-application" />
        <input name="name" />
        <input name="email" />
        <input name="role" />
        <input name="expertise" />
        <input name="linkedin" />
      </form>

      <form name="donation" netlify>
        <input type="hidden" name="form-name" value="donation" />
        <input name="amount" />
      </form>
    </div>
    <p>If you see this file in the published site it means Netlify forms were included in the build.</p>
  </body>
</html>
