name: Deploy to Netlify

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Use reusable deploy action
        uses: ./.github/actions/deploy-netlify
        with:
          site_id: ${{ secrets.NETLIFY_SITE_ID }}
          node_version: '20'
