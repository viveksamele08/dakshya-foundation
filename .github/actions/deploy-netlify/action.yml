name: "Deploy to Netlify (composite)"
description: "Build the site and deploy to Netlify using netlify-cli. Expects NETLIFY_AUTH_TOKEN in env and site_id input."
inputs:
  site_id:
    description: 'Netlify site ID'
    required: true
  node_version:
    description: 'Node.js version to use for build'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Deploy to Netlify
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      run: |
        if [ -z "${NETLIFY_AUTH_TOKEN}" ]; then
          echo "ERROR: NETLIFY_AUTH_TOKEN is required as a secret" >&2
          exit 1
        fi
        npx netlify-cli@latest deploy --dir=dist --prod --site=${{ inputs.site_id }}
